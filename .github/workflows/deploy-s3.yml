# 本番デプロイ: master への push（public/ 配下の変更時）で S3 + CloudFront へ反映
# 認証は OIDC（長期キー不要）。SHOGI_API_KEY は GitHub Secrets から注入。
# 変数/シークレット未設定の間はスキップ（安全）。初期設定手順: docs/CICD_SETUP.md
name: Deploy to S3

on:
  push:
    branches: [master]
    paths: ['public/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-s3
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.AWS_ROLE_ARN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject API keys (replace placeholders in public/)
        # secrets コンテキストは if: 条件式では使えない（GitHub Actionsの仕様上の制限）ため、
        # 未設定チェックもこのステップの bash 内で行う
        env:
          SHOGI_API_KEY: ${{ secrets.SHOGI_API_KEY }}
          SHOGI_ALPHA_API_KEY: ${{ secrets.SHOGI_ALPHA_API_KEY }}
        run: |
          if [ -z "$SHOGI_API_KEY" ]; then
            echo "::error::secrets.SHOGI_API_KEY が未設定です。Settings → Secrets and variables → Actions → Secrets に追加してください。"
            exit 1
          fi
          # ※ "__API_KEY__" は "__ALPHA_API_KEY__" の部分文字列ではないため独立に置換できる
          hits=$(grep -rl "__API_KEY__" public/ || true)
          if [ -z "$hits" ]; then
            echo "::error::__API_KEY__ プレースホルダが public/ に見つかりません"
            exit 1
          fi
          echo "Injecting main key into $(echo "$hits" | wc -l | tr -d ' ') file(s)"
          # ログにキーを絶対に出さない（perl の置換は env 変数参照のみ）
          echo "$hits" | while read -r f; do
            perl -i -pe 's/__API_KEY__/$ENV{SHOGI_API_KEY}/g' "$f"
          done
          alpha_hits=$(grep -rl "__ALPHA_API_KEY__" public/ || true)
          if [ -n "$alpha_hits" ]; then
            if [ -z "$SHOGI_ALPHA_API_KEY" ]; then
              echo "::error::α版ページが __ALPHA_API_KEY__ を要求していますが secrets.SHOGI_ALPHA_API_KEY が未設定です。"
              exit 1
            fi
            echo "Injecting alpha key into $(echo "$alpha_hits" | wc -l | tr -d ' ') file(s)"
            echo "$alpha_hits" | while read -r f; do
              perl -i -pe 's/__ALPHA_API_KEY__/$ENV{SHOGI_ALPHA_API_KEY}/g' "$f"
            done
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Sync to S3
        # deploy.sh と同一の除外リスト。ACL 無しは CloudFront が AccessDenied になるので必須
        run: |
          aws s3 sync public/ s3://shogi.nkkuma.tokyo \
            --exclude "firebase.json" \
            --exclude "404.html" \
            --exclude "mentenanse/*" \
            --exclude "*.DS_Store" \
            --exclude ".git/*" \
            --acl public-read

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ECK0AXFXSKK8W --paths '/*'
